<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Predictor · SmartSpend AI</title>
<link rel="stylesheet" href="/static/css/theme.css"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head><body>
<nav class="nav">
  <a href="/" class="nav-brand"><div class="ico">🧠</div><div class="lbl">Smart<span>Spend</span></div></a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a><a href="/expenses">Expenses</a>
    <a href="/goals">Goals</a><a href="/splits">Splits</a>
    <a href="/gamification">Rewards</a><a href="/predictor" class="active">Predictor</a>
    <button class="btn-out" onclick="logout()">⏻ Exit</button>
  </div>
</nav>
<div class="pg">
  <div style="font-family:var(--ffd);font-size:.95rem;letter-spacing:.1em;margin-bottom:18px">//&nbsp;<span style="color:var(--purple)">AI FINANCIAL PREDICTOR</span></div>

  <div class="col2" style="margin-bottom:18px">
    <!-- Spending Prediction -->
    <div class="card hc">
      <div class="sl"><i class="fas fa-chart-line" style="color:var(--cyan)"></i> Next Month Forecast</div>
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:.72rem;color:var(--txtd);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">AI Predicted Spend</div>
        <div style="font-family:var(--ffm);font-size:2.5rem;font-weight:700;color:var(--cyan)" id="predAmt">₹–</div>
        <div style="font-size:.76rem;color:var(--txtd);margin-top:4px" id="predTrend">Loading forecast...</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px" id="predMonths"></div>
      <canvas id="predChart" height="90" style="margin-top:14px"></canvas>
    </div>

    <!-- Goal Predictor -->
    <div class="card hv">
      <div class="sl"><i class="fas fa-calculator" style="color:var(--purple)"></i> Goal Time Predictor</div>
      <div class="fg"><label class="fl">Goal Target (₹)</label><input type="number" class="fi" id="pGA" placeholder="60000"/></div>
      <div class="fg"><label class="fl">Already Saved (₹)</label><input type="number" class="fi" id="pCS" placeholder="10000"/></div>
      <div class="fg"><label class="fl">Monthly Saving (₹)</label><input type="number" class="fi" id="pMS" placeholder="5000"/></div>
      <button class="btn bv" style="width:100%;justify-content:center" onclick="runPredict()"><i class="fas fa-wand-magic-sparkles"></i> Predict</button>
      <div id="predRes" style="display:none;margin-top:14px;background:var(--bge);border-radius:10px;padding:14px;border:1px solid var(--bdr)"></div>
    </div>
  </div>

  <!-- Health Score Detail -->
  <div class="card hc">
    <div class="sl"><i class="fas fa-heartbeat" style="color:var(--pink)"></i> Financial Health Analysis</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div style="text-align:center">
        <div style="position:relative;display:inline-flex;align-items:center;justify-content:center">
          <svg width="130" height="130" viewBox="0 0 130 130">
            <circle cx="65" cy="65" r="55" fill="none" stroke="rgba(0,245,255,0.07)" stroke-width="10"/>
            <circle id="hArc" cx="65" cy="65" r="55" fill="none" stroke="url(#hg2)" stroke-width="10" stroke-linecap="round" stroke-dasharray="346" stroke-dashoffset="346" transform="rotate(-90 65 65)" style="transition:stroke-dashoffset 1.2s ease"/>
            <defs><linearGradient id="hg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:var(--cyan)"/><stop offset="100%" style="stop-color:var(--purple)"/></linearGradient></defs>
          </svg>
          <div style="position:absolute;text-align:center">
            <div style="font-family:var(--ffm);font-size:1.8rem;font-weight:700" id="hScore">–</div>
            <div style="font-size:.62rem;color:var(--txtd)">/100</div>
          </div>
        </div>
        <div id="hGrade" class="bdg bc2" style="margin-top:8px;font-size:.78rem">–</div>
      </div>
      <div id="hDetails" style="display:grid;gap:8px;align-content:center"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const T=()=>localStorage.getItem('token');
const H=()=>({'Content-Type':'application/json','Authorization':'Bearer '+T()});
let pChart=null;

async function loadPredictor(){
  const [r1,r2]=await Promise.all([
    fetch('/api/expenses/predict',{headers:H()}),
    fetch('/api/expenses/health-score',{headers:H()}),
  ]);
  const p=await r1.json(), h=await r2.json();

  document.getElementById('predAmt').textContent='₹'+Math.round(p.predicted||0).toLocaleString();
  const trend=p.trend||0;
  document.getElementById('predTrend').textContent=trend>0?`📈 Spending trending UP by ₹${Math.round(trend).toLocaleString()}/month`:trend<0?`📉 Spending trending DOWN by ₹${Math.abs(Math.round(trend)).toLocaleString()}/month`:'📊 Spending is stable';

  const months=p.last_3_months||[0,0,0];
  const now=new Date();
  const labels=['2 months ago','Last month','This month'];
  document.getElementById('predMonths').innerHTML=months.map((v,i)=>`<div style="text-align:center;background:var(--bge);border-radius:8px;padding:8px 6px;border:1px solid var(--bdr)">
    <div style="font-family:var(--ffm);font-size:1rem;color:var(--cyan)">₹${Math.round(v).toLocaleString()}</div>
    <div style="font-size:.6rem;color:var(--txtd)">${labels[i]}</div>
  </div>`).join('');

  // Chart
  if(pChart)pChart.destroy();
  const allMonths=[...months,Math.round(p.predicted||0)];
  const allLabels=[...labels,'Predicted →'];
  pChart=new Chart(document.getElementById('predChart'),{type:'line',
    data:{labels:allLabels,datasets:[{data:allMonths,borderColor:'rgba(0,245,255,0.8)',backgroundColor:'rgba(0,245,255,0.07)',fill:true,tension:.4,pointBackgroundColor:['#00F5FF','#00F5FF','#00F5FF','#FF2D78'],pointRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,245,255,0.04)'},ticks:{color:'#4A7A9B',font:{size:10}}},y:{grid:{color:'rgba(0,245,255,0.04)'},ticks:{color:'#4A7A9B',font:{size:10},callback:v=>'₹'+v}}}}});

  // Health
  const sc=h.score||0;
  document.getElementById('hScore').textContent=sc;
  document.getElementById('hArc').style.strokeDashoffset=346-(346*(sc/100));
  const ge=document.getElementById('hGrade');
  ge.textContent=`${h.grade} · ${h.label}`;
  ge.className='bdg '+(sc>=80?'bg3':sc>=60?'bc2':sc>=40?'ba2':'bp2');
  document.getElementById('hDetails').innerHTML=`
    <div style="background:var(--bge);border-radius:8px;padding:10px 12px;border:1px solid var(--bdr)">
      <div style="font-size:.7rem;color:var(--txtd)">Impulse Rate</div>
      <div style="font-family:var(--ffm);font-size:1.1rem;color:var(--pink)">${h.impulse_pct}%</div>
    </div>
    <div style="background:var(--bge);border-radius:8px;padding:10px 12px;border:1px solid var(--bdr)">
      <div style="font-size:.7rem;color:var(--txtd)">Streak Days</div>
      <div style="font-family:var(--ffm);font-size:1.1rem;color:var(--green)">${h.streak_days}</div>
    </div>
    <div style="background:var(--bge);border-radius:8px;padding:10px 12px;border:1px solid var(--bdr)">
      <div style="font-size:.7rem;color:var(--txtd)">Active Goals</div>
      <div style="font-family:var(--ffm);font-size:1.1rem;color:var(--cyan)">${h.active_goals}</div>
    </div>
    <div style="background:var(--bge);border-radius:8px;padding:10px 12px;border:1px solid var(--bdr)">
      <div style="font-size:.7rem;color:var(--txtd)">Total Points</div>
      <div style="font-family:var(--ffm);font-size:1.1rem;color:var(--purple)">${h.points}</div>
    </div>`;
}

async function runPredict(){
  const ga=parseFloat(document.getElementById('pGA').value)||0;
  const cs=parseFloat(document.getElementById('pCS').value)||0;
  const ms=parseFloat(document.getElementById('pMS').value)||0;
  if(!ga||!ms){showT('Fill goal amount and monthly saving','err');return;}
  const r=await fetch('/api/goals/predict',{method:'POST',headers:H(),body:JSON.stringify({goal_amount:ga,current_savings:cs,monthly_saving:ms})});
  const d=await r.json();
  const el=document.getElementById('predRes');
  el.style.display='block';
  el.innerHTML=`<div style="display:grid;gap:9px;font-size:.84rem">
    <div style="display:flex;justify-content:space-between"><span style="color:var(--txtd)">Time Needed</span><b style="font-family:var(--ffm);color:var(--cyan)">${d.months_needed} months</b></div>
    <div style="display:flex;justify-content:space-between"><span style="color:var(--txtd)">With +10% savings</span><b style="font-family:var(--ffm);color:var(--green)">${d.improved_months} months</b></div>
    <div style="display:flex;justify-content:space-between"><span style="color:var(--txtd)">Months saved</span><b style="font-family:var(--ffm);color:var(--amber)">${d.months_saved} months</b></div>
    <div style="border-top:1px solid var(--bdr);padding-top:8px;color:var(--txtd);font-size:.78rem">💡 ${d.tip}</div>
  </div>`;
}

function showT(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast'+(t?' '+t:'');el.style.display='block';setTimeout(()=>el.style.display='none',3200);}
function logout(){localStorage.clear();location.href='/login';}
if(!T())location.href='/login';
loadPredictor();
</script>
</body></html>
